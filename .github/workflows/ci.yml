name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Lint ──────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install linters and project
        run: |
          pip install -e ".[dev]"
          cd backend && pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ backend/app/
      - name: Ruff format check
        run: ruff format --check src/ backend/app/
      - name: Mypy
        run: |
          mypy src/materia/ --ignore-missing-imports
          mypy backend/app/ --ignore-missing-imports

  # ── Backend Tests ─────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: matforge
          POSTGRES_PASSWORD: matforge
          POSTGRES_DB: matforge_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://matforge:matforge@localhost:5432/matforge_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      WEBSOCKET_REDIS_URL: redis://localhost:6379/3
      SECRET_KEY: ci-test-secret-key
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          cd backend && pip install -e ".[dev]"
      - name: Run core engine tests
        run: pytest tests/ -v --cov=src/materia --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage.xml

  # ── Frontend Lint & Type Check ────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npx next lint
      - name: Type check
        run: npx tsc --noEmit

  # ── Frontend Build ────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.matforge.ai/api/v1
          NEXTAUTH_SECRET: build-time-placeholder
          NEXT_PUBLIC_FIREBASE_API_KEY: build-placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: matforge-50499

  # ── SDK Tests ─────────────────────────────────────────────
  sdk-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install SDK
        run: cd sdk && pip install -e ".[dev]"
      - name: Test SDK
        run: cd sdk && pytest tests/ -v || echo "No SDK tests found yet"
