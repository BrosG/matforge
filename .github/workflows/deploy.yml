name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  GCP_PROJECT_ID: matforge-50499
  GCP_REGION: us-central1
  AR_REPO: matforge

jobs:
  # ── Determine Environment ─────────────────────────────────
  determine-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}
      suffix: ${{ steps.env.outputs.suffix }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "suffix=" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "image_tag=staging-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
            echo "suffix=-staging" >> $GITHUB_OUTPUT
          fi

  # ── Build & Push API ──────────────────────────────────────
  build-push-api:
    needs: determine-env
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-env.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push API image
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/api:${{ needs.determine-env.outputs.image_tag }}
          docker build \
            -f backend/Dockerfile \
            --target production \
            -t $IMAGE \
            .
          docker push $IMAGE

  # ── Build & Push Worker ───────────────────────────────────
  build-push-worker:
    needs: determine-env
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-env.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push Worker image
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/worker:${{ needs.determine-env.outputs.image_tag }}
          docker build \
            -f backend/Dockerfile \
            --target production \
            -t $IMAGE \
            .
          docker push $IMAGE

  # ── Build & Push Frontend ─────────────────────────────────
  build-push-frontend:
    needs: determine-env
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-env.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and push Frontend image
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ needs.determine-env.outputs.image_tag }}
          docker build \
            -f frontend/Dockerfile \
            --target production \
            --build-arg NEXT_PUBLIC_API_URL=https://api.matcraft.ai/api/v1 \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=matforge-50499.firebaseapp.com \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=matforge-50499 \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=matforge-50499.appspot.com \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }} \
            -t $IMAGE \
            frontend/
          docker push $IMAGE

  # ── Deploy to Cloud Run ───────────────────────────────────
  deploy:
    needs: [determine-env, build-push-api, build-push-worker, build-push-frontend]
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-env.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy matforge-api${{ needs.determine-env.outputs.suffix }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/api:${{ needs.determine-env.outputs.image_tag }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --vpc-connector matforge-connector \
            --add-cloudsql-instances ${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:matforge-db \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest,REDIS_URL=REDIS_URL:latest,CELERY_BROKER_URL=CELERY_BROKER_URL:latest,CELERY_RESULT_BACKEND=CELERY_RESULT_BACKEND:latest,WEBSOCKET_REDIS_URL=WEBSOCKET_REDIS_URL:latest" \
            --update-env-vars "ENVIRONMENT=${{ needs.determine-env.outputs.environment }},BACKEND_CORS_ORIGINS=https://matcraft.ai" \
            --service-account matforge-api@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --min-instances 0 \
            --max-instances 10 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 600 \
            --port 8000 \
            --allow-unauthenticated

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy matforge-worker${{ needs.determine-env.outputs.suffix }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/worker:${{ needs.determine-env.outputs.image_tag }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --vpc-connector matforge-connector \
            --add-cloudsql-instances ${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:matforge-db \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest,CELERY_BROKER_URL=CELERY_BROKER_URL:latest,CELERY_RESULT_BACKEND=CELERY_RESULT_BACKEND:latest,WEBSOCKET_REDIS_URL=WEBSOCKET_REDIS_URL:latest" \
            --update-env-vars "ENVIRONMENT=${{ needs.determine-env.outputs.environment }}" \
            --service-account matforge-api@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --min-instances 1 \
            --max-instances 5 \
            --memory 4Gi \
            --cpu 2 \
            --timeout 3600 \
            --no-cpu-throttling \
            --port 8080 \
            --command "sh" \
            --args "-c,python -c 'from worker_health import start_health_server; start_health_server()' & celery -A app.tasks.celery_app worker --loglevel=info --queues=default,campaigns --concurrency=2" \
            --no-allow-unauthenticated

      - name: Deploy Frontend to Cloud Run
        run: |
          SHORT_SHA=$(echo "${{ needs.determine-env.outputs.image_tag }}" | tr '.' '-' | cut -c1-40)
          gcloud run deploy matforge-frontend${{ needs.determine-env.outputs.suffix }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ needs.determine-env.outputs.image_tag }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --revision-suffix "${SHORT_SHA}" \
            --set-secrets "NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest" \
            --set-env-vars "NEXTAUTH_URL=https://matcraft.ai,NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --service-account matforge-frontend@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --min-instances 1 \
            --max-instances 5 \
            --memory 512Mi \
            --cpu 1 \
            --port 3000 \
            --allow-unauthenticated

      - name: Print service URLs
        run: |
          echo "=== Deployment Complete ==="
          gcloud run services describe matforge-api${{ needs.determine-env.outputs.suffix }} --region ${{ env.GCP_REGION }} --format 'value(status.url)'
          gcloud run services describe matforge-frontend${{ needs.determine-env.outputs.suffix }} --region ${{ env.GCP_REGION }} --format 'value(status.url)'
