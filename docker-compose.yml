services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: matforge
      POSTGRES_PASSWORD: matforge
      POSTGRES_DB: matforge_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://matforge:matforge@db:5432/matforge_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WEBSOCKET_REDIS_URL: redis://redis:6379/3
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      ENABLE_API_AUTHENTICATION: "true"
    volumes:
      - ./backend:/app/backend
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend/app

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    environment:
      DATABASE_URL: postgresql+psycopg2://matforge:matforge@db:5432/matforge_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WEBSOCKET_REDIS_URL: redis://redis:6379/3
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
    volumes:
      - ./backend:/app/backend
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --queues=default,campaigns
      --concurrency=2

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      INTERNAL_API_URL: http://api:8000/api/v1
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-nextauth-secret-change-in-production
      PRISMA_DATABASE_URL: postgresql://matforge:matforge@db:5432/matforge_dev?schema=app
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-matforge-50499.firebaseapp.com}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-matforge-50499}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
